services:
  # 1. The Database
  db:
    image: postgres:15
    container_name: driftsense-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: driftsense_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. The Model Registry
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.3
    container_name: driftsense-mlflow
    ports:
      - "5000:5000"
    # We added a quick pip install right before booting the server
    command: >
      sh -c "pip install psycopg2-binary && 
      mlflow server 
      --backend-store-uri postgresql://postgres:password@db:5432/driftsense_db 
      --default-artifact-root /mlruns 
      --host 0.0.0.0"
    depends_on:
      - db

  # 3. The Python Inference Engine
  inference:
    build: ./inference
    container_name: driftsense-inference
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow

  # 4. The Java Spring Boot Orchestrator
  backend:
    build: ./backend
    container_name: driftsense-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/driftsense_db
      - SPRING_DATASOURCE_USERNAME=postgres   # <-- ADD THIS
      - SPRING_DATASOURCE_PASSWORD=password   # <-- ADD THIS
    depends_on:
      - db
      - inference

volumes:
  postgres_data: