services:
  # ----------------------------------------
  # Database: PostgreSQL
  # ----------------------------------------
  postgres:
    image: postgres:15
    container_name: driftsense_db
    restart: always
    environment:
      POSTGRES_USER: driftsense_admin
      POSTGRES_PASSWORD: super_secret_password
      POSTGRES_DB: driftsense_db
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - driftsense_network

  # ----------------------------------------
  # MLOps: MLflow Tracking Server
  # ----------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: driftsense_mlflow
    restart: always
    ports:
      - "5000:5000"
    environment:
      - AWS_ACCESS_KEY_ID=minioadmin      # Placeholder for future S3/MinIO setup
      - AWS_SECRET_ACCESS_KEY=minioadmin
    # We use sh -c to install the postgres adapter right before starting the server
    command: >
      sh -c "pip install psycopg2-binary &&
      mlflow server 
      --backend-store-uri postgresql://driftsense_admin:super_secret_password@postgres:5432/driftsense_db 
      --default-artifact-root /mlflow/artifacts 
      --host 0.0.0.0"
    depends_on:
      - postgres
    volumes:
      - ./mlflow_data:/mlflow/artifacts
    networks:
      - driftsense_network

# Define the custom network so containers can resolve each other by name (e.g., 'postgres')
networks:
  driftsense_network:
    driver: bridge